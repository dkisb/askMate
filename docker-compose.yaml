volumes:
  db_data:

services:
  database:
    image: postgres:18
    container_name: askmate_database
    restart: on-failure
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: ${SPRING_DATASOURCE_DB}
    ports:
      - "${SPRING_DATASOURCE_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql

  backend:
    build:
      context: ./backend
    container_name: askmate_backend
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/${SPRING_DATASOURCE_DB}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      askMate.app.jwtSecret: ${JWT_SECRET}
      askMate.app.jwtExpirationMs: ${JWT_EXPIRATION_MS}
    ports:
      - "8080:8080"
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
    container_name: askmate_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
